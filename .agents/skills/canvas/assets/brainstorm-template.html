<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>canvas</title>
<style>
  :root {
    --ink: #1a1f2e; --muted: #5a6276; --line: #e3e6ee; --bg: #f7f8fb;
    --card: #ffffff; --accent: #0ca678; --ok: #2f9e44; --warn: #e8930c; --err: #c92a2a;
  }
  * { box-sizing: border-box; }
  body { font: 15px/1.55 -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--ink);
         background: var(--bg); margin: 0; padding: 32px 16px 96px; }
  .wrap { max-width: 1020px; margin: 0 auto; }
  h1 { font-size: 24px; margin: 0 0 4px; }
  h2 { font-size: 17px; margin: 28px 0 10px; }
  .sub { color: var(--muted); margin: 0 0 18px; font-size: 13.5px; }
  .chip { display: inline-block; font-size: 11.5px; font-weight: 600; padding: 2px 10px;
          border-radius: 99px; background: #e6f7f1; color: var(--accent); margin: 0 6px 4px 0; }
  .chip.gray { background: #eef0f5; color: var(--muted); }
  .chip.warn { background: #fdf1dc; color: var(--warn); }
  .chip.ok { background: #e6f7ec; color: var(--ok); }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
          padding: 16px 18px; font-size: 13.5px; }
  code { font-family: ui-monospace, monospace; font-size: 12.5px; background: #eef0f5;
         padding: 1px 5px; border-radius: 4px; }
  pre { font-family: ui-monospace, monospace; font-size: 11.5px; line-height: 1.5;
        background: #1a1f2e; color: #d8dee9; border-radius: 8px; padding: 12px 14px;
        overflow-x: auto; margin: 8px 0; }
  pre .c { color: #7f8ba3; }
  table { border-collapse: collapse; }
  th { text-align: left; font-size: 11px; color: var(--muted); }
  td { padding: 4px 10px 4px 0; vertical-align: top; }

  .banner { border: 2px solid var(--ok); background: #f6fcf8; border-radius: 12px;
            padding: 18px 22px; margin: 14px 0; }
  .banner h2 { margin: 0 0 6px; font-size: 20px; color: var(--ok); }

  .log { font-size: 13px; }
  .log .item { padding: 8px 0; border-bottom: 1px dashed var(--line); }
  .log .item:last-child { border-bottom: none; }
  .log .dnum { display: inline-block; width: 22px; height: 22px; border-radius: 50%;
               background: #e6f7ec; color: var(--ok); text-align: center; line-height: 22px;
               font-size: 11.5px; font-weight: 700; margin-right: 8px; }

  .decision { border: 2px solid var(--accent); border-radius: 12px; background: var(--card);
              padding: 20px 22px; margin: 18px 0; }
  .decision .dlabel { font-size: 12px; font-weight: 700; color: var(--accent);
                      text-transform: uppercase; letter-spacing: .06em; }
  .decision h2 { margin: 4px 0 10px; font-size: 20px; }
  .decision .dbody { font-size: 14px; }
  .insight { background: #fffaf0; border-left: 4px solid var(--warn); border-radius: 6px;
             padding: 12px 16px; font-size: 13.5px; margin: 0 0 14px; }
  .opts { display: flex; gap: 12px; margin: 14px 0; align-items: stretch; flex-wrap: wrap; }
  .opt { flex: 1; min-width: 220px; border: 1px solid var(--line); border-radius: 10px;
         padding: 12px 14px; position: relative; background: #fcfcfe; }
  .opt h4 { margin: 0 0 6px; font-size: 13.5px; padding-right: 86px; }
  .opt .tag { position: absolute; top: 12px; right: 12px; font-size: 10.5px; font-weight: 700;
              padding: 2px 8px; border-radius: 99px; background: #e6f7ec; color: var(--ok); }
  .opt.rec { border: 2px solid var(--ok); background: #f6fcf8; }
  .opt p { font-size: 12.5px; margin: 4px 0; }
  .opt .pro b, .opt .con b { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .opt .pro b { color: var(--ok); } .opt .con b { color: var(--err); }
  .why { background: #f6fcf8; border-left: 4px solid var(--ok); border-radius: 6px;
         padding: 10px 14px; font-size: 13.5px; margin: 12px 0; }

  .queue { font-size: 13px; color: var(--muted); }
  .queue .qitem { padding: 7px 0; border-bottom: 1px dashed var(--line); }
  .queue .qitem:last-child { border-bottom: none; }
  .queue .qnum { display: inline-block; width: 22px; height: 22px; border-radius: 50%;
                 background: #eef0f5; text-align: center; line-height: 22px; font-size: 11.5px;
                 font-weight: 700; margin-right: 8px; }

  .rv { margin: 14px 0 2px; }
  .rv textarea { width: 100%; min-height: 64px; border: 1px dashed #b6bdd1; border-radius: 8px;
                 padding: 8px 10px; font: 13px/1.5 inherit; background: #fcfcfe; resize: vertical; }
  .rv textarea:focus { outline: none; border-color: var(--accent); border-style: solid; background: #fff; }
  .rv label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px;
              text-transform: uppercase; letter-spacing: .05em; }
  .rv.has-text textarea { border-color: var(--ok); border-style: solid; background: #f4fbf6; }

  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
                border-top: 1px solid var(--line); padding: 12px 16px;
                box-shadow: 0 -4px 16px rgba(20,25,45,.07); z-index: 10; }
  .submit-inner { max-width: 1020px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
  button { font: 600 14px inherit; background: var(--accent); color: #fff; border: 0;
           border-radius: 8px; padding: 10px 22px; cursor: pointer; }
  button:disabled { background: #b9c0cf; cursor: default; }
  #status { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  #status.ok { color: var(--ok); font-weight: 600; }
  #status.err { color: var(--err); font-weight: 600; }
  .spinner { width: 15px; height: 15px; border: 2.5px solid #d6dae5; border-top-color: var(--accent);
             border-radius: 50%; animation: spin .8s linear infinite; flex: 0 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .foot { margin-top: 28px; font-size: 12px; color: var(--muted); }

  /* full-page waiting overlay: the page is non-interactive until the next round renders */
  #overlay { position: fixed; inset: 0; z-index: 100; display: none;
             align-items: center; justify-content: center; flex-direction: column; gap: 16px;
             background: rgba(247, 248, 251, .88); backdrop-filter: blur(2px);
             -webkit-backdrop-filter: blur(2px); }
  #overlay.show { display: flex; }
  #overlay .spinner { width: 44px; height: 44px; border-width: 5px; }
  #overlay .msg { font-size: 15px; font-weight: 600; color: var(--ink); }
  #overlay .submsg { font-size: 12.5px; color: var(--muted); margin-top: -8px; }
</style>
</head>
<body>
<div class="wrap" id="app"><p style="color:var(--muted)">Loading…</p></div>

<div id="overlay">
  <div class="spinner"></div>
  <div class="msg">Recorded — the agent is working</div>
  <div class="submsg">This page will redraw itself when the next step is ready.</div>
</div>

<div class="submit-bar">
  <div class="submit-inner">
    <button id="submit">Submit</button>
    <span id="status">Your answer autosaves locally as you type.</span>
  </div>
</div>

<script>
/*
 * Data-driven canvas page. The agent never edits this file after the first copy —
 * each round it rewrites state.json and bumps version.json; the page re-renders in place.
 *
 * state.json shape:
 * {
 *   "doc":   "behavioral-engine",            // page stem: keys feedback + autosave
 *   "title": "behavioral-engine — brainstorm",
 *   "chips": [{"text":"phase ① brainstorm"}, {"text":"decision 2 of 5","kind":"gray|warn|ok"}],
 *   "intro": "<small html under the chips>",
 *   "sections": [                            // rendered in order; kinds:
 *     {"kind":"banner","title":"✓ The brief is settled","html":"…"},
 *     {"kind":"card","heading":"Digest","html":"…"},
 *     {"kind":"log","heading":"Decided this brainstorm",
 *      "items":[{"num":1,"html":"<b>…</b> …"}], "emptyText":"— nothing yet —"},
 *     {"kind":"decision","label":"Decision 2 · claim scoping","title":"…",
 *      "insightHtml":"…(optional amber callout)…","bodyHtml":"…",
 *      "options":[{"title":"A · …","html":"…","rec":true,"tag":"recommended"}],
 *      "extraHtml":"…(optional, e.g. a <pre> sketch)…","whyHtml":"<b>My recommendation…</b>",
 *      "reviewId":"decision-2-claim-scoping","placeholder":"e.g. \"B\", \"B but…\""},
 *     {"kind":"queue","heading":"The queue","items":[{"num":3,"html":"…"}]}
 *   ],
 *   "foot": "Canvas page — ephemeral mirror; the brief is canonical (… @ <commit>)."
 * }
 */
(function () {
  // Render fixes: never restore stale scroll; every redraw reads top-down.
  if ("scrollRestoration" in history) history.scrollRestoration = "manual";

  var DOC = "canvas", KEY = null, saved = {};
  var app = document.getElementById("app");
  var btn = document.getElementById("submit");
  var status = document.getElementById("status");
  var overlay = document.getElementById("overlay");
  var currentVersion = null;
  var waiting = false;

  function esc(s) { return String(s); } // state html is agent-authored: trusted by design

  function render(state) {
    DOC = state.doc || "canvas";
    KEY = "bp-canvas:" + DOC;
    try { saved = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch (e) { saved = {}; }
    document.title = state.title || "canvas";

    var h = "<h1>" + esc(state.title) + "</h1><p class=\"sub\">";
    (state.chips || []).forEach(function (c) {
      h += "<span class=\"chip " + (c.kind || "") + "\">" + esc(c.text) + "</span>";
    });
    if (state.intro) h += "<br>" + state.intro;
    h += "</p>";

    (state.sections || []).forEach(function (s) {
      if (s.heading) h += "<h2>" + esc(s.heading) + "</h2>";
      if (s.kind === "banner") {
        h += "<div class=\"banner\"><h2>" + esc(s.title) + "</h2><p style=\"font-size:13.5px;margin:0\">" + s.html + "</p></div>";
      } else if (s.kind === "card") {
        h += "<div class=\"card\">" + s.html + "</div>";
      } else if (s.kind === "log") {
        h += "<div class=\"card log\">";
        if (!s.items || !s.items.length) {
          h += "<div class=\"item\" style=\"color:var(--muted)\">" + esc(s.emptyText || "—") + "</div>";
        } else {
          s.items.forEach(function (it) {
            h += "<div class=\"item\"><span class=\"dnum\">" + it.num + "</span>" + it.html + "</div>";
          });
        }
        h += "</div>";
      } else if (s.kind === "queue") {
        h += "<div class=\"card queue\">";
        (s.items || []).forEach(function (it) {
          h += "<div class=\"qitem\"><span class=\"qnum\">" + it.num + "</span>" + it.html + "</div>";
        });
        h += "</div>";
      } else if (s.kind === "decision") {
        h += "<div class=\"decision\">";
        if (s.label) h += "<div class=\"dlabel\">" + esc(s.label) + "</div>";
        if (s.title) h += "<h2>" + esc(s.title) + "</h2>";
        if (s.insightHtml) h += "<div class=\"insight\">" + s.insightHtml + "</div>";
        if (s.bodyHtml) h += "<div class=\"dbody\">" + s.bodyHtml + "</div>";
        if (s.options && s.options.length) {
          h += "<div class=\"opts\">";
          s.options.forEach(function (o) {
            h += "<div class=\"opt" + (o.rec ? " rec" : "") + "\">";
            if (o.rec) h += "<span class=\"tag\">" + esc(o.tag || "recommended") + "</span>";
            h += "<h4>" + esc(o.title) + "</h4>" + o.html + "</div>";
          });
          h += "</div>";
        }
        if (s.extraHtml) h += s.extraHtml;
        if (s.whyHtml) h += "<div class=\"why\">" + s.whyHtml + "</div>";
        if (s.reviewId) h += "<div class=\"rv\" data-review-id=\"" + s.reviewId + "\" data-ph=\"" + (s.placeholder || "Your call.") + "\"></div>";
        h += "</div>";
      }
    });

    if (state.foot) h += "<p class=\"foot\">" + state.foot + "</p>";
    app.innerHTML = h;

    // attach comment boxes
    app.querySelectorAll("[data-review-id]").forEach(function (el) {
      var id = el.getAttribute("data-review-id");
      var label = document.createElement("label");
      label.textContent = "Your call — " + id;
      var ta = document.createElement("textarea");
      ta.placeholder = el.getAttribute("data-ph") || "Empty = fine as is.";
      ta.value = saved[id] || "";
      if (ta.value) el.classList.add("has-text");
      ta.addEventListener("input", function () {
        saved[id] = ta.value;
        el.classList.toggle("has-text", !!ta.value.trim());
        try { localStorage.setItem(KEY, JSON.stringify(saved)); } catch (e) {}
      });
      el.appendChild(label);
      el.appendChild(ta);
    });

    // Render fix: new round, read from the top; lift the waiting overlay.
    window.scrollTo(0, 0);
    overlay.classList.remove("show");
    waiting = false;
    btn.disabled = false;
    status.className = "";
    status.textContent = "Your answer autosaves locally as you type.";
  }

  function loadState() {
    return fetch("state.json?t=" + Date.now())
      .then(function (r) { return r.json(); })
      .then(render)
      .catch(function () {
        app.innerHTML = "<p style=\"color:var(--err)\">Couldn't load state.json — is the canvas server running?</p>";
      });
  }

  btn.addEventListener("click", function () {
    var comments = {};
    Object.keys(saved).forEach(function (k) {
      if (saved[k] && saved[k].trim()) comments[k] = saved[k].trim();
    });
    var payload = { doc: DOC, exported: new Date().toISOString(), comments: comments };
    status.className = ""; status.textContent = "Submitting…";
    fetch("/feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).then(function (r) {
      if (!r.ok) throw new Error(r.status);
      // Render fix: a full-page waiting overlay — clearly non-interactive until the next round.
      waiting = true;
      btn.disabled = true;
      try { localStorage.removeItem(KEY); } catch (e) {}
      saved = {};
      overlay.classList.add("show");
      status.className = "";
      status.textContent = "Recorded.";
    }).catch(function (e) {
      status.className = "err";
      status.textContent = "Submit failed (" + e.message + ") — your text is still saved locally.";
    });
  });

  // version polling: state changed -> re-render in place (no full reload, no scroll jump)
  setInterval(function () {
    fetch("version.json?t=" + Date.now())
      .then(function (r) { return r.json(); })
      .then(function (j) {
        if (currentVersion === null) currentVersion = j.v;
        else if (j.v !== currentVersion) { currentVersion = j.v; loadState(); }
      })
      .catch(function () {
        if (waiting) {
          overlay.classList.remove("show");
          status.className = "err"; status.textContent = "Lost the canvas server — ask the agent.";
          waiting = false; btn.disabled = false;
        }
      });
  }, 3000);

  loadState();
})();
</script>
</body>
</html>
